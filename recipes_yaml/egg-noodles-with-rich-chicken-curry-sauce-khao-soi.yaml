instructions: 'Heat the oil in a medium saucepan over medium heat. Add the garlic
  and chopped shallot and cook for about 30 seconds. Add the curry paste and curry
  powder and cook for another 30 seconds, stirring constantly. Add the coconut milk,
  chicken broth, chicken thighs, fish sauce, and sugar. Stir everything together,
  scraping up any curry paste that has stuck to the bottom of the pan. Bring to a
  boil, then lower heat and simmer uncovered for about 30 minutes. Taste and adjust
  seasoning.


  Meanwhile, bring a large pot of salted water to a boil. Cook noodles according to
  package directions, timing it so that the noodles will be cooked when the curry
  is done simmering. Drain and divide between two bowls. Top with curry and the garnishes
  of your choice. Serve immediately.'
notes: 'You can substitute the chicken with other types of meat, tofu or vegetables.


  Sauce can be made one day ahead and refrigerated. Reheat and serve with freshly-cooked
  noodles and garnishes.'
