id: easy-skillet-chicken-pot-pie
name: Easy Skillet Chicken Pot Pie
tags:
- onRotation
servings: '6'
prep_time: null
cook_time: null
source: http://www.thekitchn.com/recipe-easy-skillet-chicken-pot-pie-234134
last_planned: null
ingredients:
- name: olive oil
  quantity: '1'
  unit: tablespoon
- name: boneless skinless chicken breasts cut into 1-inch pieces
  quantity: 1 1/2
  unit: pounds
- name: medium onion chopped
  quantity: '1'
- name: (16-ounce) bag frozen peas and carrots
  quantity: '1'
- name: garlic minced
  quantity: '2'
  unit: cloves
- name: low-sodium chicken broth
  quantity: '2'
  unit: cups
- name: all-purpose flour
  quantity: '3'
  unit: tablespoons
- name: whole milk
  quantity: 1/2
  unit: cup
- name: Freshly ground black pepper
  section: Salt
- name: store-bought pie crust thawed if frozen
  quantity: '1'
  section: Salt
instructions: 'Preheat the oven to 400°F.


  Heat olive oil in a 9 or 10-inch cast-iron skillet over medium-high heat. Add the
  chicken, season with salt and pepper, and sauté until cooked through, 5 to 6 minutes.
  Transfer the chicken to a plate.


  Add the onion to the skillet. Sauté until tender and lightly browned, 3 to 4 minutes.
  Add the peas and carrots and garlic and cook 1 minute more. Sprinkle in the flour
  and stir until the flour dissolves. Add the chicken broth, bring to a simmer, and
  stir until thickened, 8 to 10 minutes. Turn off the heat, stir in the milk, and
  season as needed with salt and pepper.


  Add the chicken to the skillet and stir to combine. Unfold the pie crust and place
  over the top of the filling, tucking the excess edges inside the pan. Use a sharp
  knife to cut 4 (1-inch) slits in top of the crust to vent. Bake until the crust
  is golden-brown, about 20 minutes.'
notes: 'Storages: Leftovers can be refrigerated for up to 3 days.'
