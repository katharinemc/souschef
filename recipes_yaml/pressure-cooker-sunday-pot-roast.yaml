id: pressure-cooker-sunday-pot-roast
name: Pressure Cooker Sunday Pot Roast
tags:
- onRotation
servings: 4-6 servings
prep_time: 15 minutes
cook_time: 35 minutes
source: https://recipes.instantpot.com/recipe/pressure-cooker-sunday-pot-roast/
last_planned: null
ingredients:
- name: '- 5 pounds chuck roast'
  quantity: 2 1/2
- name: extra fat removed cut across the grain in 2-inch slices connective tissue
    removed patted dry with paper towels
- name: season all salt
  quantity: '1'
  unit: tablespoon
- name: or choice of spices
- name: pepper
  quantity: 1/2
  unit: teaspoon
- name: oil
  quantity: '1'
  unit: tablespoon
- name: Water
  quantity: 1 3/4
  unit: cup
- name: beef bouillon powder
  quantity: '2'
  unit: teaspoons
- name: or base alternatively swap out bouillon and water for 1 3/4 cup beef broth
- name: Worcestershire sauce
  quantity: 1/4
  unit: cup
- name: medium onion sliced thick
  quantity: '1'
- name: bay leaves
  quantity: '2'
- name: potatoes
  quantity: '2'
  unit: pounds
- name: peeled and sliced/cubed
- name: baby carrots
  quantity: '1'
  unit: cup
- name: or 2-inch cut length in 2-inch slices
- name: all-purpose flour
  quantity: '3'
  unit: tablespoons
- name: butter
  quantity: '3'
  unit: tablespoons
- name: softened and unsalted
instructions: 'Coat the roast with seasoning.


  Put 1 tablespoon of oil into the Instant Pot on Saute mode and adjust to high heat.
  When pot is hot, brown the roast pieces in small batches in a single layer on all
  sides for a minute or two. Remove roast and turn off the Instant Pot.


  In a large measuring cup, mix the water, Worcestershire, and beef bouillon. Slowly
  pour into pot.


  Scrape all the brown bits off the bottom. Put roast pieces back in. Top with onions
  and bay leaves.


  Cover, seal, and cook on Manual at high pressure for 30 minutes, followed by a 15
  minute natural release.


  Remove the roast, and onions. Cover with foil.


  Place potatoes and carrots in a steamer basket.


  Place the basket into the leftover broth from the roast in the Instant Pot. Cover
  and cook on Manual at high pressure for 5-6 minutes. When time is up quick release
  the pressure. Remove the steamer basket from the pot.


  If you want, mash the potatoes in desired method or leave in whole chunks.


  Mash the flour and butter together in a small bowl. Quickly whisk in the flour mixture
  into the broth.


  Heat the broth on Saute function, stirring continuously until thickened to desired
  consistency. Serve roast with the steamed vegetables and the thickened sauce drizzled
  on top. Enjoy!'
notes: null
