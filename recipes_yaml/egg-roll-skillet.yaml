last_planned: null
ingredients:
- name: olive or vegetable oil
  quantity: '1'
  unit: tablespoon
- name: ground pork
  quantity: '1'
  unit: pound
- name: medium yellow onion diced
  quantity: '1'
- name: kosher salt
  quantity: 1/2
  unit: teaspoon
- name: Freshly ground black pepper
- name: garlic minced
  quantity: '3'
  unit: cloves
- name: minced peeled fresh ginger
  quantity: '1'
  unit: tablespoon
- name: (14-ounce) bag coleslaw mix
  quantity: '1'
- name: tamari soy sauce or coconut aminos
  quantity: '2'
  unit: tablespoons
- name: thinly sliced scallions
  quantity: 1/4
  unit: cup
- name: toasted (Asian) sesame oil
  quantity: '1'
  unit: teaspoon
- name: rice vinegar
  quantity: '1'
  unit: teaspoon
instructions: 'Heat the oil in a large frying pan over medium-high heat until shimmering.
  Add the pork and onion, and season with the salt and pepper. Cook, breaking up the
  meat into small pieces with a wooden spoon, until the meat is cooked through and
  the onion is tender, about 8 minutes.


  Add the garlic and ginger and cook until fragrant, about 1 minute. Add the coleslaw
  mix and soy sauce and cook, stirring occasionally, until the cabbage is crisp-tender,
  about 3 minutes. Remove from the heat, add the scallions, sesame oil, and vinegar,
  and stir to combine. Taste and season with salt and pepper as needed.'
notes: 'Storage: Leftovers can be stored in an airtight container in the refrigerator
  for up to 4 days.'
