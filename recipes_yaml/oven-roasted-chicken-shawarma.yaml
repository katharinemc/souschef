id: oven-roasted-chicken-shawarma
name: Oven-Roasted Chicken Shawarma
tags:
- onRotation
servings: 4 to 6 servings
prep_time: null
cook_time: 45 min
source: https://cooking.nytimes.com/recipes/1017161-oven-roasted-chicken-shawarma
last_planned: null
ingredients:
- name: lemons juiced
  quantity: '2'
- name: plus 1 tablespoon olive oil
  quantity: 1/2
  unit: cup
- name: garlic peeled smashed and minced
  quantity: '6'
  unit: cloves
- name: kosher salt
  quantity: '1'
  unit: teaspoon
- name: freshly ground black pepper
  quantity: '2'
  unit: teaspoons
- name: ground cumin
  quantity: '2'
  unit: teaspoons
- name: paprika
  quantity: '2'
  unit: teaspoons
- name: turmeric
  quantity: 1/2
  unit: teaspoon
- name: A pinch ground cinnamon
- name: Red pepper flakes to taste
- name: boneless skinless chicken thighs
  quantity: '2'
  unit: pounds
- name: large red onion peeled and quartered
  quantity: '1'
- name: chopped fresh parsley
  quantity: '2'
  unit: tablespoons
instructions: 'Prepare a marinade for the chicken. Combine the lemon juice, 1/2 cup
  olive oil, garlic, salt, pepper, cumin, paprika, turmeric, cinnamon and red pepper
  flakes in a large bowl, then whisk to combine. Add the chicken and toss well to
  coat. Cover and store in refrigerator for at least 1 hour and up to 12 hours.


  When ready to cook, heat oven to 425 degrees. Use the remaining tablespoon of olive
  oil to grease a rimmed sheet pan. Add the quartered onion to the chicken and marinade,
  and toss once to combine. Remove the chicken and onion from the marinade, and place
  on the pan, spreading everything evenly across it.


  Put the chicken in the oven and roast until it is browned, crisp at the edges and
  cooked through, about 30 to 40 minutes. Remove from the oven, allow to rest 2 minutes,
  then slice into bits. (To make the chicken even more crisp, set a large pan over
  high heat, add a tablespoon of olive oil to the pan, then the sliced chicken, and
  sauté until everything curls tight in the heat.) Scatter the parsley over the top
  and serve with tomatoes, cucumbers, pita, white sauce, hot sauce, olives, fried
  eggplant, feta, rice — really anything you desire.'
