id: rosemary-garlic-chicken-thighs
name: Rosemary-Garlic Chicken Thighs
tags:
- onRotation
servings: 4 servings
prep_time: 20 mins
cook_time: 40 mins
source: https://www.realsimple.com/food-recipes/browse-all-recipes/rosemary-garlic-chicken-thighs
last_planned: null
ingredients:
- name: bone-in skin-on chicken thighs
  quantity: '8'
- name: kosher salt divided
  quantity: 1¼
  unit: teaspoons
- name: freshly ground black pepper divided
  quantity: ¾
  unit: teaspoon
- name: olive oil
  quantity: '1'
  unit: tablespoon
- name: shallots peeled and halved
  quantity: '8'
- name: chopped fresh rosemary
  quantity: '1'
  unit: tablespoon
- name: garlic finely chopped
  quantity: '2'
  unit: cloves
- name: chicken broth
  quantity: ¾
  unit: cup
- name: green beans trimmed
  quantity: '8'
  unit: ounces
- name: unsalted butter
  quantity: '2'
  unit: tablespoons
instructions: 'Preheat oven to 475°F. Season chicken with ¾￼ teaspoon salt and ￼½
  teaspoon pepper. Heat oil in a large oven-safe skillet over medium-high. Add chicken,
  skin side down, and cook, turning once, until golden brown on both sides, 10 to
  12 minutes. Transfer chicken to a plate.


  Add shallots to skillet and cook until browned, about 5 minutes. Add rosemary, garlic,
  and broth and bring to a boil. Return chicken to skillet, skin side up. Transfer
  to oven and roast until chicken is cooked through and shallots are tender, 15 to
  20 minutes.


  Transfer chicken to a plate. Place skillet over medium-high; add beans and remaining
  ½ teaspoon salt and ￼¼ teaspoon pepper. Simmer until sauce is thickened and beans
  are crisp-tender, 3 to 4 minutes. Stir in butter. Serve chicken with vegetables
  and sauce.'
