id: chickpea-curry
name: Chickpea Curry
tags:
- vegetarian
servings: 6 servings
prep_time: 5 minutes
cook_time: 20 minutes
source: http://thepioneerwoman.com/cooking/chickpea-curry/
last_planned: null
ingredients:
- name: Basmati Rice
  quantity: '2'
  unit: cups
- name: Vegetable Oil
  quantity: '2'
  unit: Tablespoons
- name: whole Large Onion Diced Fine
  quantity: '1'
- name: Salt And Pepper to taste
- name: Curry Powder Any Variety
  quantity: '2'
  unit: teaspoons
- name: Garlic Minced
  quantity: '2'
  unit: cloves
- name: Vegetable Stock
  quantity: '1'
  unit: cup
- name: Chickpeas Drained And Rinsed
  quantity: '2'
  unit: cans
- name: (13.5 Ounce) Coconut Milk
  quantity: '1'
  unit: can
- name: Honey More To Taste
  quantity: '1'
  unit: Tablespoon
- name: Sriracha Or Hot Sauce (more To Taste)
  quantity: '1'
  unit: Tablespoon
- name: Lime Wedges For Serving (optional)
instructions: 'Cook the basmati rice according to the package instructions.


  Heat the oil in a medium skillet over medium-low heat. Add the onions, season with
  salt and pepper and cook for a few minutes, until the onions are soft and starting
  to turn golden. Sprinkle in the curry powder and garlic and stir, cooking for another
  minute or so. Pour in the vegetable stock and stir to scrape up all the brown bits
  in the pan. Add the coconut milk, honey and a squirt of sriracha. Bring to a boil,
  add the chickpeas, reduce the heat, and simmer for 10 minutes. Taste and adjust
  the seasoning, adding more salt, honey, or Sriracha (or lime juice, if using.)


  Serve the curry over the rice. Garnish with the cilantro.'
