id: korean-beef-bowl
name: Korean Beef Bowl
tags:
- onRotation
servings: 4 servings
prep_time: 5 minutes
cook_time: 10 minutes
source: https://damndelicious.net/2013/07/07/korean-beef-bowl/
last_planned: null
ingredients:
- name: brown sugar packed
  quantity: 1/4
  unit: cup
- name: reduced sodium soy sauce
  quantity: 1/4
  unit: cup
- name: sesame oil
  quantity: '2'
  unit: teaspoons
- name: crushed red-pepper flakes or more to taste
  quantity: 1/2
  unit: teaspoon
- name: ground ginger
  quantity: 1/4
  unit: teaspoon
- name: vegetable oil
  quantity: '1'
  unit: tablespoon
- name: garlic minced
  quantity: '3'
  unit: cloves
- name: ground beef
  quantity: '1'
  unit: pound
- name: green onions thinly sliced
  quantity: '2'
- name: sesame seeds
  quantity: 1/4
  unit: teaspoon
instructions: 'In a small bowl, whisk together brown sugar, soy sauce, sesame oil,
  red pepper flakes and ginger.


  Heat vegetable oil in a large skillet over medium high heat. Add garlic and cook,
  stirring constantly, until fragrant, about 1 minute. Add ground beef and cook until
  browned, about 3-5 minutes, making sure to crumble the beef as it cooks; drain excess
  fat.


  Stir in soy sauce mixture and green onions until well combined, allowing to simmer
  until heated through, about 2 minutes.


  Serve immediately, garnished with green onion and sesame seeds, if desired.'
notes: null
