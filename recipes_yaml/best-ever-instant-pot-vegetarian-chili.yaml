id: best-ever-instant-pot-vegetarian-chili
name: Best Ever Instant Pot Vegetarian Chili
tags:
- vegetarian
servings: '6'
prep_time: 10 minutes
cook_time: 35 minutes
source: https://www.acouplecooks.com/instant-pot-vegetarian-chili/
last_planned: null
ingredients:
- name: medium yellow onions
  quantity: '2'
- name: green bell pepper
  quantity: '1'
- name: olive oil
  quantity: ¼
  unit: cup
- name: fennel seeds
  quantity: ½
  unit: teaspoon
- name: dry brown or green lentils
  quantity: ¾
  unit: cup
- name: diced fire roasted tomatoes
  quantity: '28'
  unit: ounce
- name: can crushed fire roasted tomatoes
  quantity: '28'
  unit: ounce
- name: vegetable broth
  quantity: '2'
  unit: cups
- name: kosher salt
  quantity: 1 ½
  unit: teaspoon
- name: onion powder
  quantity: '1'
  unit: teaspoon
- name: garlic powder
  quantity: '1'
  unit: teaspoon
- name: oregano
  quantity: '1'
  unit: tablespoon
- name: cumin divided
  quantity: '2'
  unit: teaspoons
- name: plus 1 teaspoon chili powder*
  quantity: '3'
  unit: tablespoons
- name: -ounce can kidney beans
  quantity: 1 15
- name: -ounce can black beans
  quantity: 1 15
- name: medium or 1 large garlic clove grated
  quantity: '2'
- name: 'For serving: sour cream or cashew cream shredded cheese hot sauce cilantro
    sliced green onion roasted and salted pepitas'
instructions: 'Dice the onions. Dice the pepper.


  Turn on Saute mode and add the olive oil to the Instant Pot. When it is heated,
  add the onion, pepper, and fennel seeds and saute for 6 to 7 minutes until translucent.
  Add the lentils, tomatoes, broth, kosher salt, onion powder, garlic powder, oregano,
  1 teaspoon cumin, and 3 tablespoons chili powder. Lock the lid of the Instant Pot.
  Place the pressure release handle (vent) in the “Sealing” position.


  Cook on High Pressure for 12 minutes: Press the Pressure Cook button, making sure
  the “High Pressure” setting is selected, and set the time. Note that it takes about
  15 minutes for the pot to “preheat” and come up to pressure before it starts cooking.
  (During cooking, avoid touching the metal part of the lid.)


  Quick release: Vent the remaining steam from the Instant Pot by moving the pressure
  release handle to “Venting”, covering your hand with a towel or hot pad. Never put
  your hands or face near the vent when releasing steam. Open the pressure cooker
  lid.


  Add the final flavorings: Drain and rinse the beans. Stir in the beans, grate in
  the garlic (using a microplane is easy), and add the remaining 1 teaspoon chili
  powder and 1 teaspoon cumin. Allow it to rest for 5 minutes before serving. Taste
  and season with additional salt and fresh ground pepper as necessary.


  Load it up: Load up with toppings, as they provide the final flavoring! Use sour
  cream or cashew cream, shredded cheese, hot sauce, cilantro, sliced green onion,
  roasted and salted pepitas, or your other favorite toppings.'
notes: null
