id: spicy-buffalo-cauliflower-bowls-with-avocado-and-green-tahini
name: Spicy Buffalo Cauliflower Bowls with Avocado and Green Tahini
tags:
- vegetarian
servings: '4'
prep_time: 20 minutes
cook_time: 18 minutes to 22 minutes
source: https://www.thekitchn.com/buffalo-cauliflower-bowl-267487
last_planned: null
ingredients:
- name: 'For the cauliflower and bowls:'
- name: head cauliflower (about 2 pounds) cut into bite-sized florets
  quantity: '1'
- name: olive oil
  quantity: '3'
  unit: tablespoons
- name: garlic powder
  quantity: '2'
  unit: teaspoons
- name: kosher salt
  quantity: '1'
  unit: teaspoon
- name: Freshly ground black pepper
- name: hot sauce such as Frank's RedHot or harissa sauce
  quantity: 1/3
  unit: cup
- name: cooked brown rice (I like Trader Joe's Frozen Brown Rice which is ready in
    3 minutes in the microwave)
  quantity: '2'
  unit: cups
- name: to 8 ounces coleslaw mix or shredded green or red cabbage
  quantity: '6'
- name: medium avocado quartered and thinly sliced
  quantity: '1'
- name: Thinly sliced radishes for serving (optional)
- name: tightly packed fresh tender herbs such as cilantro and parsley
  quantity: '1'
  unit: cup
- name: well-stirred tahini
  quantity: 1/4
  unit: cup
- name: freshly squeezed lemon juice (from 1 large lemon)
  quantity: '3'
  unit: tablespoons
- name: olive oil
  quantity: '2'
  unit: tablespoons
- name: to 3 tablespoons water
  quantity: '2'
- name: kosher salt
  quantity: 1/4
  unit: teaspoon
- name: Freshly ground black pepper
instructions: 'Arrange an oven rack in the lowest position and heat to 475°F. Place
  the cauliflower on a rimmed baking sheet. Drizzle with the oil and season with the
  garlic powder, salt, and several grinds of pepper. Toss to coat and arrange in an
  even layer. Roast, tossing halfway through, until beginning to brown and crisp,
  13 to 15 minutes total.


  Remove the cauliflower from the oven. Pour the hot sauce over the cauliflower and
  use a spatula to toss until evenly coated. Return to the oven and roast until crispy
  and warmed through, 5 to 7 minutes more. Meanwhile, make the green tahini.


  Place the herbs in a food processor fitted with the blade attachment and pulse until
  coarsely chopped, about 10 pulses. Add the tahini, lemon juice, oil, 2 tablespoons
  of the water, salt, and several grinds of black pepper. Process until smooth, about
  1 minute. If tahini is too thick to pour, add the extra tablespoon of water and
  process until smooth.


  Place the slaw mix in a medium bowl, drizzle with half the tahini sauce, and toss
  to combine. Divide the dressed slaw and brown rice among 4 shallow bowls. Top with
  the cauliflower and avocado. Drizzle the remaining sauce over the bowls and finish
  with sliced radishes, if using.'
notes: 'Storage: Leftovers can be refrigerated in an airtight container for up to
  4 days. Store the sauce in a separate container.'
