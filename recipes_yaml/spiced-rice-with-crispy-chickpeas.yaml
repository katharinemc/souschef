id: spiced-rice-with-crispy-chickpeas
name: Spiced Rice with Crispy Chickpeas
tags:
- vegetarian
servings: '4'
prep_time: 45 mins
cook_time: 45 mins
source: https://www.realsimple.com/food-recipes/browse-all-recipes/chickpeas-rice-recipe
last_planned: null
ingredients:
- name: basmati rice
  quantity: '1'
  unit: cup
- name: olive oil divided
  quantity: '5'
  unit: tablespoons
- name: large shallots cut into wedges
  quantity: '2'
- name: kosher salt divided
  quantity: 1 ½
  unit: teaspoons
- name: garlic finely chopped
  quantity: '2'
  unit: cloves
- name: garam masala
  quantity: 1 ½
  unit: teaspoons
- name: dried pitted dates chopped
  quantity: '6'
- name: .5-oz. can chickpeas drained rinsed and patted very dry
  quantity: 1 15
- name: ground turmeric
  quantity: 1 ¼
  unit: teaspoons
- name: freshly ground black pepper
  quantity: ¼
  unit: teaspoon
- name: salted roasted pistachios chopped
  quantity: ⅓
  unit: cup
- name: Chopped fresh cilantro and plain Greek yogurt for serving
instructions: 'Instructions Checklist


  Place rice in a fine-mesh strainer; rinse until water runs clear.


  Heat 1 tablespoon oil in a saucepan over medium. Add shallots and ¼ teaspoon salt;
  cook, stirring often, until softened, about 4 minutes. Add garlic and rice. Cook,
  stirring constantly, until edges of rice become translucent, 2 to 3 minutes. Stir
  in garam masala; cook, stirring, until fragrant, about 30 seconds. Stir in 1½ cups
  water and 1 teaspoon salt; bring to a boil. Stir, cover, and reduce heat to medium-low.
  Cook until liquid is absorbed, 10 to 12 minutes.


  Remove from heat. Stir in dates and fluff rice with a fork. Place a clean towel
  over saucepan; cover and let stand until rice is tender, about 5 minutes. Fluff
  rice and transfer to a serving platter.


  Heat 1 tablespoon oil in a large nonstick skillet over medium. Add chickpeas; cook,
  stirring occasionally, until browned in spots and crisp, 16 to 18 minutes. Add remaining
  3 tablespoons oil, turmeric, pepper, and remaining ¼ teaspoon salt. Cook, stirring
  constantly, until chickpeas are sizzling, about 1 minute.


  Top rice with chickpea and oil mixture, pistachios, and cilantro. Serve with yogurt.'
