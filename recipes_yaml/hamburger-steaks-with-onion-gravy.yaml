id: hamburger-steaks-with-onion-gravy
name: Hamburger Steaks with Onion Gravy
tags:
- onRotation
servings: '4'
prep_time: null
cook_time: 40 minutes
source: https://www.americastestkitchen.com/cookscountry/recipes/11446-hamburger-steaks-with-onion-gravy?ref=new_search_experience_2&extcode=MASKM00L0
last_planned: null
ingredients:
- name: 85 percent lean ground beef
  quantity: 1 1/2
  unit: pounds
- name: panko bread crumb
  quantity: 1/2
  unit: cup
- name: Lipton Onion Soup and Dip Mix
  quantity: '2'
  unit: tablespoons
- name: pepper
  quantity: 1/2
  unit: teaspoon
- name: unsalted butter divided
  quantity: '3'
  unit: tablespoons
- name: onion halved and sliced thin
  quantity: '1'
- name: all-purpose flour
  quantity: 1 1/2
  unit: tablespoons
- name: beef broth
  quantity: 1 1/2
  unit: cups
- name: minced fresh chives
  quantity: '1'
  unit: tablespoon
instructions: 'In large bowl, mix beef, panko, soup mix, and pepper with your hands
  until fully combined. Form mixture into four 4-inch-diameter patties, about ½ inch
  thick. Using your fingertips, press down center of each patty to create slight indentation.


  Melt 1 tablespoon butter in 12-inch nonstick skillet over medium-high heat. Add
  patties and cook until well browned and meat registers 130 degrees, about 4 minutes
  per side. Transfer to platter and tent with aluminum foil.


  Reduce heat to medium, add onion to now-empty skillet, and cook until lightly browned
  and beginning to soften, about 4 minutes. Stir in flour and cook for 1 minute. Whisk
  in broth and bring to boil. Cook until thickened, about 4 minutes. Off heat, stir
  in remaining 2 tablespoons butter. Season with salt and pepper to taste. Spoon sauce
  over steaks and sprinkle with chives. Serve.'
notes: null
