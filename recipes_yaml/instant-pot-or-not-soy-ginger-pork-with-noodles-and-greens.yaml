id: instant-pot-or-not-soy-ginger-pork-with-noodles-and-greens
name: Instant Pot (Or Not) Soy-Ginger Pork with Noodles and Greens
tags:
- onRotation
servings: 4 to 6
prep_time: 5 minutes
cook_time: 1 hour
source: https://food52.com/recipes/78012-instant-pot-or-not-soy-ginger-pork-with-noodles-and-greens
last_planned: null
ingredients:
- name: 'For the pork:'
- name: to 3 1/2 pounds pork shoulder or country-style pork ribs cut into 1 1/2-inch
    chunks and excess fat trimmed
  quantity: '3'
- name: soy sauce
  quantity: 1/4
  unit: cup
- name: rice vinegar (unseasoned i.e. no salt or sugar)
  quantity: 1/3
  unit: cup
- name: fish sauce
  quantity: '1'
  unit: tablespoon
- name: (or more for a spicier kick) chile-garlic sauce (can substitute gochujang
    or other red chile paste)
  quantity: '2'
  unit: teaspoons
- name: brown sugar (light or dark)
  quantity: '2'
  unit: tablespoons
- name: water
  quantity: '1'
  unit: cup
- name: unpeeled ginger (about 4-inches or 3 ounces) scrubbed well and cut into 3
    chunks
  quantity: '1'
  unit: piece
- name: whole green onions trimmed and washed well
  quantity: '3'
- name: noodles such as lo mein Chinese egg noodles even spaghetti!
  quantity: '12'
  unit: ounces
- name: kale (Tuscan or curly) ribs removed and chopped (about 5 to 6 cups in total)
  quantity: '1'
  unit: bunch
- name: toasted sesame oil
  quantity: '1'
  unit: tablespoon
- name: 'To garnish: thinly sliced green onions toasted sesame seeds and more chile-garlic
    sauce (if desired)'
instructions: 'Add pork and rest of ingredients (soy sauce through whole green onions)
  to the pressure cooker.


  Cover and cook on high pressure for 45 minutes. Allow the pressure to release naturally,
  or if you''re in a hurry, release the pressure manually.


  Using a slotted spoon, transfer the pork to a bowl and cover with foil to keep warm.
  Discard the ginger and green onions. Use a fat separator to separate the fat from
  the broth, or just spoon the fat off the top. Taste the broth, and adjust spiciness
  to taste. Pour the broth back over the pork. (Can make up to two days in advance
  and refrigerate.)


  When ready to serve, warm pork and broth in saucepan (if needed). Cook noodles in
  a large pot of generously salted water. Add kale to the pot during the last two
  minutes of cook time. Drain well and return to pot. Immediately toss the noodles
  and kale with sesame oil, then add the pork and about a cup of broth (can make the
  noodles more or less brothy). Garnish with sesame seeds and slivered green onions
  and more chile-garlic sauce, if desired.'
notes: null
