id: tofu-and-mushroom-larb
name: Tofu and Mushroom Larb
tags:
- vegetarian
servings: '4'
prep_time: 30 mins
cook_time: 30 mins
source: https://www.realsimple.com/food-recipes/browse-all-recipes/tofu-and-mushroom-larb-recipe
last_planned: null
ingredients:
- name: -oz. package extra-firm tofu drained
  quantity: 1 14
- name: melted unrefined coconut oil divided
  quantity: ¼
  unit: cup
- name: oz.s sliced shiitake mushrooms (about 4 cups) divided
  quantity: '8'
- name: kosher salt
  quantity: ¼
  unit: teaspoon
- name: fresh lime juice (from 2 limes) plus wedges for serving
  quantity: 3½
  unit: tablespoons
- name: fish sauce or tamari
  quantity: '2'
  unit: tablespoons
- name: packed light brown sugar
  quantity: 2½
  unit: teaspoons
- name: crushed red pepper
  quantity: ½
  unit: teaspoon
- name: shallot very thinly sliced
  quantity: '1'
- name: scallions white and light green parts finely chopped (¼ cup)
  quantity: '3'
- name: chopped fresh cilantro leaves (from 1 bunch) divided
  quantity: ½
  unit: cup
- name: chopped roasted salted cashews
  quantity: ½
  unit: cup
- name: lightly packed fresh mint leaves torn if large
  quantity: ½
  unit: cup
- name: small head red cabbage quartered and leaves separated
  quantity: '1'
- name: Cooked sushi rice for serving
instructions: 'Instructions Checklist


  Press tofu between paper towels to absorb liquid. Crumble into a bowl, leaving some
  large pieces.


  Heat 1 tablespoon oil in a large nonstick skillet over medium-high. Add half of
  mushrooms and cook, undisturbed, until golden, about 3 minutes. Toss; cook until
  browned, about 2 minutes. Transfer to a plate. Repeat with 1 tablespoon oil and
  remaining mushrooms. Season with salt.


  Heat remaining 2 tablespoons oil over medium-high. Add tofu; cook, undisturbed,
  until golden brown on underside, about 5 minutes. Toss; cook until golden and crispy,
  4 to 5 minutes. Remove from heat. Stir in mushrooms, lime juice, fish sauce, sugar,
  and crushed red pepper. Add shallot, scallions, and half of cilantro; toss. Top
  with cashews, mint, and remaining cilantro. Scoop onto cabbage leaves; serve with
  rice and lime wedges.'
