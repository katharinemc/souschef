id: shakshuka-eggs-poached-in-spicy-tomato-sauce
name: Shakshuka [Eggs Poached in Spicy Tomato Sauce]
tags:
- vegetarian
servings: 4 to 6
prep_time: null
cook_time: null
source: http://smittenkitchen.com/blog/2010/04/shakshuka/
last_planned: null
ingredients:
- name: olive oil
  quantity: 1/4
  unit: cup
- name: Anaheim chiles or 3 jalape&#241os stemmed seeded and finely chopped (I was
    nervous and only used 2 Anaheims; I would go for 3 or 4 next time for a more moderate
    but still gentle kick)
  quantity: '5'
- name: small yellow onion chopped
  quantity: '1'
- name: garlic crushed then sliced
  quantity: '5'
  unit: cloves
- name: ground cumin
  quantity: '1'
  unit: teaspoon
- name: paprika
  quantity: '1'
  unit: tablespoon
- name: -ounce can whole peeled tomatoes undrained
  quantity: 1 28
- name: Kosher salt to taste
- name: eggs
  quantity: '6'
- name: feta cheese crumbled
  quantity: 1/2
  unit: cup
- name: chopped flat-leaf parsley
  quantity: '1'
  unit: tablespoon
- name: Warm pitas for serving
instructions: 'Heat oil in a 12-inch skillet over medium-high heat. Add chiles and
  onions and cook, stirring occasionally, until soft and golden brown, about 6 minutes.
  Add garlic, cumin, and paprika, and cook, stirring frequently, until garlic is soft,
  about 2 more minutes.


  Put tomatoes and their liquid into a medium bowl and crush with your hands. Add
  crushed tomatoes and their liquid to skillet along with 1/2 cup water, reduce heat
  to medium, and simmer, stirring occasionally, until thickened slightly, about 15
  minutes. Season sauce with salt.


  Crack eggs over sauce so that eggs are evenly distributed across sauce’s surface.
  Cover skillet and cook until yolks are just set, about 5 minutes. Using a spoon,
  baste the whites of the eggs with tomato mixture, being careful not to disturb the
  yolk. Sprinkle shakshuka with feta and parsley and serve with pitas, for dipping.'
notes: null
