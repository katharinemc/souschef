instructions: 'Gently wash the rice in a bowl, soak for 30 minutes, then drain. Warm
  the oil in a 12 cup sauce pan with the onion, ginger, garlic, and turmeric come.
  Cook over medium low heat for eight minutes, then add the rice and salt. Stir to
  coat the greens, then add the coconut milk, 2 cups water, and the lime leaves. Bring
  to a boil, turn the heat to low, cover, and cook until the rice is done, 15 to 18
  minutes, stirring twice during cooking. Turn off the heat and set it aside while
  you prepare the tofu. It will look a little wet at first, but the liquid will be
  absorbed by the time you''re ready.


