id: zuppa-toscana-creamy-potato-kale-soup-with-italian-sausage
name: Zuppa Toscana {Creamy Potato & Kale Soup with Italian Sausage}
tags:
- onRotation
servings: 6 servings
prep_time: null
cook_time: null
source: https://www.alaskafromscratch.com/2014/10/28/zuppa-toscana-creamy-potato-kale-soup-italian-sausage/
last_planned: null
ingredients:
- name: olive oil
  quantity: '1'
  unit: tablespoon
- name: italian sausage
  quantity: '1'
  unit: pound
- name: red pepper flakes (or to taste)
  quantity: ¼
  unit: teaspoon
- name: garlic minced
  quantity: '3'
  unit: cloves
- name: onion diced
  quantity: '1'
- name: chicken broth
  quantity: '4'
  unit: cups
- name: small russet potatoes thinly sliced
  quantity: '3'
- name: kale finely chopped
  quantity: '2'
  unit: cups
- name: heavy cream
  quantity: '1'
  unit: cup
- name: salt and pepper to taste
instructions: To a large pot over medium heat, add the olive oil. Brown the sausage
  until no longer pink. Add the red pepper flakes, garlic, and onion and cook, stirring
  often, until the onions a translucent and the garlic is fragrant, about 4 minutes.
  Add the chicken broth, potatoes, and kale. Bring the broth to a simmer, reduce the
  heat to medium-low, and cook until the potatoes are tender, about 10 minutes. Remove
  the soup from the heat, stir in the cream, and season with salt and pepper to taste.
  Ladle into soup bowls and serve.
notes: null
