id: red-curry-lentil-sweet-potato-soup
name: Red Curry Lentil & Sweet Potato Soup
tags:
- freezer
- vegetarian
servings: 6 servings
prep_time: null
cook_time: null
source: http://www.alaskafromscratch.com/2016/10/22/red-curry-lentil-sweet-potato-soup/
last_planned: null
ingredients:
- name: canola oil
  quantity: '2'
  unit: tablespoons
- name: onion chopped
  quantity: '1'
- name: garlic chopped
  quantity: '4'
  unit: cloves
- name: Thai red curry paste
  quantity: '3'
  unit: tablespoons
- name: large sweet potatoes peeled and cut into bite-sized cubes
  quantity: '2'
- name: (15 ounce) can diced tomatoes
  quantity: '1'
- name: lentils preferably red
  quantity: 1 1/2
  unit: cups
- name: chicken broth
  quantity: '6'
  unit: cups
- name: (14.5 ounce can coconut milk
  quantity: '1'
- name: salt and pepper to taste
- name: juice of half a lime
- name: cilantro finely chopped for serving
  quantity: 1/4
  unit: cup
instructions: To a dutch oven or soup pot over medium heat, add the oil. Sauté the
  onions in the oil until softened, about two minutes. Add the garlic, then stir in
  the red curry paste, continuing to cook another one minute. Add the sweet potatoes,
  can of diced tomatoes, and lentils to the pan, stirring to combine. Season with
  salt. Pour the chicken into the pan and bring to a boil. Reduce the heat to medium-low
  and simmer 20 minutes or until the lentils and sweet potatoes are tender. Stir in
  the coconut milk and lime juice. Season with salt and pepper to taste. Serve with
  a sprinkle of fresh cilantro over each bowl.
notes: null
